# ─────────────────────────────────────────────────────────────────────────────
# docker/nginx.conf
#
# nginx acts as the single external entry point on port 80:
#
#   GET /              → serve React SPA (index.html + assets)
#   GET /api/*         → proxy to Flask backend on backend:5000
#
# Because the frontend and the proxied API are on the same origin (port 80),
# browsers do NOT enforce CORS — no preflight OPTIONS requests are generated.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen       80;
    server_name  _;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/html
        text/plain;

    # ── Static frontend assets ────────────────────────────────────────────────
    root   /usr/share/nginx/html;
    index  index.html;

    # Cache hashed asset files aggressively; don't cache index.html
    location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires  1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API reverse proxy ─────────────────────────────────────────────────────
    # All requests to /api/* are forwarded to Flask keeping the full path.
    # Example: GET /api/auth/me → http://backend:5000/api/auth/me
    #
    # Important timeouts:
    #   proxy_read_timeout 300 — recommendation generation can take ~60 s on
    #   first call (SBERT inference over all candidates).
    location /api {
        proxy_pass         http://backend:5000;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward cookies so Flask-Session works
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;

        proxy_read_timeout    300s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    300s;

        # Allow large request bodies (profile data)
        client_max_body_size  10M;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # Any URL that doesn't match a real file is served as index.html so that
    # React Router can handle the route on the client side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check endpoint ─────────────────────────────────────────────────
    location /nginx-health {
        access_log  off;
        return      200 "OK\n";
        add_header  Content-Type text/plain;
    }
}
